# SonarQube Cloud Configuration
sonar.projectKey=vxture_vxture
sonar.organization=vx-6b309295f6500aba6b2a71a29ee27de77fa41583
sonar.host.url=https://sonarcloud.io

# Project information
sonar.projectName=Vxture
sonar.projectVersion=0.1.0

# Source configuration
sonar.sources=packages,portals,services,business
sonar.exclusions=\
  **/node_modules/**,\
  **/.next/**,\
  **/build/**,\
  **/dist/**,\
  **/.venv/**,\
  **/__pycache__/**,\
  **/.pytest_cache/**,\
  packages/core/config/src/schemas/platform.schema.ts,\
  packages/core/database/prisma/schema.prisma,\
  packages/ai/model-runtime-client/**,\
  portals/**,\
  portals/admin/src/app/(admin)/model-platform/**,\
  portals/admin/src/modules/ai/ModelPlatformPage.tsx,\
  portals/admin/src/styles/admin-management-models-platform.css,\
  portals/console/src/app/[locale]/(console)/model-platform/**,\
  services/model/platform/**,\
  services/support/workers/**,\
  **/prisma/migrations/**,\
  **/prisma/seeds/**,\
  **/*seed*.sql

# Coverage: exclude portals, packages, and services that do not yet meet the new-code coverage gate.
# services/model/platform still runs vitest coverage in CI; re-enable Sonar coverage gate after P2/P3 test expansion.
sonar.coverage.exclusions=\
  portals/**,\
  services/commerce/**,\
  services/identity/**,\
  services/model/platform/**,\
  services/notification/**,\
  services/platform/**,\
  services/support/**,\
  services/tenant/**,\
  packages/**

# Duplication: website and console login containers are intentionally aligned.
# Shared UI and browser helpers stay in DS/platform packages and remain analyzed.
sonar.cpd.exclusions=\
  portals/website/src/components/auth/LoginForm.tsx,\
  portals/console/src/components/auth/LoginForm.tsx

# Language configuration
# P0 foundation keeps model-platform vitest coverage in CI but does not import it into Sonar while the service rename is excluded.
sonar.python.coverage.reportPaths=coverage.xml

# Encoding
sonar.sourceEncoding=UTF-8
