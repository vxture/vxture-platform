# Two-container stack for the services profile: <code>-app (NestJS) + <code>-db
# (Atlas's own physical database, vxturestudio_modelruntime_main - see
# docs/30-design/00-index.md for why this is not a shared-platform-DB schema
# and not a vxturebiz_atlas_{env}-style business-plane DB either). PROJECT_NAME
# drives the compose project + container-name prefix so prod and beta never
# collide on one host (prod=<code>-*, beta=<code>-beta-*). No redis service
# until OIDC_RP_ENABLED=on (see .env.example) actually needs a session store -
# add it back at that point, mirroring the app-profile template's redis
# service. Structure/deploy details are exercised in the deployment batch.
name: ${PROJECT_NAME:-atlas}

services:
  app:
    container_name: ${PROJECT_NAME:-atlas}-app
    build:
      context: .
      dockerfile: service/Dockerfile
      # Local `compose build` only; the deploy path pulls the CI-built image (which
      # injects real provenance). Honest dev/unknown defaults for local builds.
      args:
        APP_VERSION: ${APP_VERSION:-dev}
        GIT_SHA: ${GIT_SHA:-unknown}
        BUILD_TIME: ${BUILD_TIME:-unknown}
        DEPLOY_STAGE: ${DEPLOY_STAGE:-dev}
    image: ${IMAGE_REGISTRY:-ghcr.io}/${IMAGE_NAMESPACE:-vxture}/${PRODUCT_CODE:-atlas}-app:${IMAGE_TAG:-local}
    # Load the full operator .env into the app so ALL runtime config (provider
    # keys, platform client, webhook, INTERNAL_JOB_TOKEN, ...) reaches it - not
    # just the few keys in `environment:` below. APP_ENV_FILE is the absolute
    # path deploy.sh passes (<root>/etc/.env); local dev falls back to ./.env.
    env_file:
      - path: ${APP_ENV_FILE:-.env}
        required: false
    environment:
      NODE_ENV: production
      PORT: "3100"
      DATABASE_URL: ${DATABASE_URL:-}
    ports:
      - "${APP_PUBLISH_PORT:-3100}:3100"
    depends_on:
      - db
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3100/model-platform/health/live"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks: [appnet]
    restart: unless-stopped

  db:
    container_name: ${PROJECT_NAME:-atlas}-db
    image: postgres:16-alpine
    environment:
      # The container superuser is the DB OWNER, NOT the service role. The DDL
      # (db-init, as this owner) creates the least-privilege <code>_svc role that
      # the app connects as via DATABASE_URL (product_240 section 2.7: connect
      # identity = <code>_svc, never owner-direct).
      POSTGRES_DB: ${POSTGRES_DB:-vxturestudio_modelruntime_main}
      POSTGRES_USER: ${POSTGRES_DB_OWNER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-}
    volumes:
      - ${DATA_DIR:-./data}/db:/var/lib/postgresql/data
    networks: [appnet]
    restart: unless-stopped

networks:
  appnet:
    name: ${PROJECT_NAME:-atlas}-net
