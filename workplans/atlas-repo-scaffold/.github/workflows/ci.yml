name: ci

# Trunk-based CI: runs on PRs to main and on push:main (the squash commit that
# lands on main is a new SHA, so it gets its own gate run). Does NOT deploy.
#
# Produces four of the five required status checks named in
# docs/50-deployment/rebuild/main-ruleset.json: `quality-gate` / `build` /
# `test-coverage` / `audit` (the fifth, `gitleaks`, is in secret-scan.yml). Job
# names are a stable contract - renaming one breaks branch protection.

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.event_name == 'pull_request' && format('pr-{0}', github.event.pull_request.number) || format('push-{0}', github.ref_name) }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # -- Audit (SCA hard gate) --------------------------------------------------
  audit:
    name: audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      # Single point of upgrade (see https://github.com/google/osv-scanner/releases).
      # Bump both the version and the sha256 below together.
      OSV_SCANNER_VERSION: "2.4.0"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache osv-scanner binary
        id: osv-cache
        uses: actions/cache@v4
        with:
          path: /tmp/osv-bin
          key: osv-scanner-${{ env.OSV_SCANNER_VERSION }}-linux-amd64

      - name: Download osv-scanner (cache miss only)
        if: ${{ steps.osv-cache.outputs.cache-hit != 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          sha256=15314940c10d26af9c6649f150b8a47c1262e8fc7e17b1d1029b0e479e8ed8a0
          url="https://github.com/google/osv-scanner/releases/download/v${OSV_SCANNER_VERSION}/osv-scanner_linux_amd64"
          mkdir -p /tmp/osv-bin
          curl -fsSL "$url" -o /tmp/osv-bin/osv-scanner
          echo "${sha256}  /tmp/osv-bin/osv-scanner" | sha256sum -c -

      - name: OSV dependency scan
        shell: bash
        run: |
          set -euo pipefail
          chmod +x /tmp/osv-bin/osv-scanner
          # Must pass --config explicitly: when scanning a --lockfile,
          # osv-scanner does not auto-discover the repo-root config, so the
          # ignore baseline would silently not apply. A new advisory exits
          # non-zero and fails this required check.
          # --allow-no-lockfiles: until Phase 4 migrates service/ in (with its
          # real dependencies), pnpm-lock.yaml has zero packages and
          # osv-scanner would otherwise exit 128 ("no package sources").
          # Remove this flag once service/ lands - a real scan should not
          # silently no-op.
          /tmp/osv-bin/osv-scanner scan -L pnpm-lock.yaml --config .osv-scanner.toml --allow-no-lockfiles

  # -- Static checks (feed quality-gate) --------------------------------------
  static-checks:
    name: static-checks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Whitespace and conflict-marker check
        run: git diff --check

      - name: Docs numbering guardrail (strict)
        run: node scripts/guardrails/check-docs-numbering.mjs --strict

      - name: Data architecture guardrail (DDL <-> Prisma lockstep)
        run: node scripts/guardrails/check-data-architecture.mjs --strict

      - name: Workflow guardrail (workflows parse and keep their triggers)
        run: node scripts/guardrails/check-workflows.mjs --strict

  # -- Quality gate (aggregator; stable required-check name) ------------------
  quality-gate:
    name: quality-gate
    runs-on: ubuntu-latest
    needs: [static-checks]
    steps:
      - name: Aggregate
        run: |
          echo "quality gate: all aggregated checks passed"

  # -- Build (required check): install the pnpm workspace, type-check, and
  # produce the NestJS esbuild bundle for the service.
  build:
    name: build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable corepack (pnpm from packageManager)
        run: corepack enable

      - name: Install (frozen lockfile)
        run: pnpm install --frozen-lockfile
        env:
          # @vxture/shared resolves from GitHub Packages (org secret, visibility
          # "all" - every org repo's Actions can read it).
          NODE_AUTH_TOKEN: ${{ secrets.NODE_AUTH_TOKEN }}

      - name: Type-check
        run: pnpm type-check:all

      - name: Generate Prisma client
        run: pnpm --filter @vxture/service-model-platform db:generate

      - name: Build service (esbuild bundle)
        run: pnpm build
        env:
          # Provenance is read at runtime (server env), not baked by esbuild;
          # set GIT_SHA so the CI build environment is representative.
          GIT_SHA: ${{ github.sha }}

  # -- Test coverage (required check): run the service's vitest suite.
  test-coverage:
    name: test-coverage
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable corepack (pnpm from packageManager)
        run: corepack enable

      - name: Install (frozen lockfile)
        run: pnpm install --frozen-lockfile
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NODE_AUTH_TOKEN }}

      - name: Generate Prisma client
        run: pnpm --filter @vxture/service-model-platform db:generate

      - name: Run tests (coverage)
        run: pnpm --filter @vxture/service-model-platform test:coverage
