name: db-init

# The ONLY pipeline allowed to touch DB structure (governance section 6). Manual,
# gated: confirm=yes + expected_sha pin (defeats a floating ref applying stale
# DDL) + the production Environment's required-reviewer approval. The container
# entrypoint never migrates and the regular deploy chain never touches schema;
# every structure change comes through here.
#
#   gh workflow run db-init.yml -f action=apply -f confirm=yes -f expected_sha=<sha>
#
# `apply` runs the DDL (00_baseline + 40_model + 97_service_role + 98_column_locks
# + incr/ increments, idempotent create-once + ADD COLUMN IF NOT EXISTS) against
# the production db container as the DB superuser (docker exec, in-container
# trust), then sets the atlas_svc role's password from the operator .env's
# DATABASE_URL so the app can authenticate. `verify` reports schema tables +
# whether the role has a password, non-destructively.
on:
  workflow_dispatch:
    inputs:
      action:
        description: "DDL action"
        required: true
        type: choice
        default: apply
        options:
          - apply
          - verify
      confirm:
        description: "Type 'yes' to confirm a structure change"
        required: true
        type: string
      expected_sha:
        description: "Commit SHA this run must match (version pin)"
        required: true
        type: string

concurrency:
  group: deploy-production
  cancel-in-progress: false

permissions:
  contents: read

env:
  # Product code: the `atlas` literal. Leave the PRODUCT_CODE repo variable
  # UNSET here - it is the template's demo escape hatch, and setting it would
  # repoint the stack root, containers, and DB.
  PRODUCT_CODE: ${{ vars.PRODUCT_CODE || 'atlas' }}

jobs:
  db-init:
    name: db-init
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment:
      name: production
    steps:
      - name: Gate on confirm + expected_sha
        shell: bash
        env:
          CONFIRM: ${{ inputs.confirm }}
          EXPECTED_SHA: ${{ inputs.expected_sha }}
          ACTUAL_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          if [ "$CONFIRM" != "yes" ]; then echo "confirm must be 'yes'" >&2; exit 1; fi
          if [ "$EXPECTED_SHA" != "$ACTUAL_SHA" ]; then
            echo "expected_sha ($EXPECTED_SHA) != run sha ($ACTUAL_SHA) - refusing" >&2
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}

      - name: Validate secrets
        shell: bash
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          TAILSCALE_OAUTH_CLIENT_ID: ${{ secrets.TAILSCALE_OAUTH_CLIENT_ID }}
          TAILSCALE_OAUTH_CLIENT_SECRET: ${{ secrets.TAILSCALE_OAUTH_CLIENT_SECRET }}
        run: |
          set -euo pipefail
          test -n "$DEPLOY_HOST"
          test -n "$DEPLOY_USER"
          test -n "$DEPLOY_SSH_KEY"
          test -n "$TAILSCALE_OAUTH_CLIENT_ID"
          test -n "$TAILSCALE_OAUTH_CLIENT_SECRET"

      - name: Join tailnet and prepare SSH
        uses: ./.github/actions/tailnet-ssh-connect
        with:
          tailscale-oauth-client-id: ${{ secrets.TAILSCALE_OAUTH_CLIENT_ID }}
          tailscale-oauth-secret: ${{ secrets.TAILSCALE_OAUTH_CLIENT_SECRET }}
          tailscale-tag: ${{ vars.TAILSCALE_OAUTH_CLIENT_TAG }}
          deploy-host: ${{ secrets.DEPLOY_HOST }}
          deploy-port: ${{ secrets.DEPLOY_PORT }}
          deploy-ssh-key: ${{ secrets.DEPLOY_SSH_KEY }}
          deploy-ssh-passphrase: ${{ secrets.DEPLOY_SSH_KEY_PASSPHRASE }}
          deploy-known-hosts: ${{ secrets.DEPLOY_KNOWN_HOSTS }}

      - name: Apply DDL over SSH
        shell: bash
        env:
          ACTION: ${{ inputs.action }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_DIR: ${{ secrets.DEPLOY_DIR }}
          PINNED_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          port="${DEPLOY_PORT:-22}"
          deploy_dir="${DEPLOY_DIR:-/srv/md0/${PRODUCT_CODE}/deploy}"
          ssh_opts=(-i ~/.ssh/deploy_key -p "$port" -o ServerAliveInterval=30 -o ServerAliveCountMax=20 -o ConnectTimeout=30)

          # Deliver the DDL from THIS run's checkout, which is pinned to
          # expected_sha, staged under /tmp so the deployed copy (owned by the
          # deploy rsync) is left untouched.
          ddl_stage="/tmp/${PRODUCT_CODE}-ddl-${PINNED_SHA:0:7}"
          ssh "${ssh_opts[@]}" "$DEPLOY_USER@$DEPLOY_HOST" "rm -rf '$ddl_stage' && mkdir -p '$ddl_stage'"
          tar -cf - -C deploy database/ddl | ssh "${ssh_opts[@]}" "$DEPLOY_USER@$DEPLOY_HOST" "tar -xf - -C '$ddl_stage'"

          cat > /tmp/db-init.sh <<'REMOTE_SCRIPT'
          set -euo pipefail
          cd "$DDL_STAGE"
          echo "[db-init] DDL source: $DDL_STAGE (pinned $PINNED_SHA)"
          # Atlas owns a fully separate physical database (vxturestudio_modelruntime_main),
          # not a schema in the shared platform DB - see docs/30-design/00-index.md.
          DB="vxturestudio_modelruntime_main"
          CONT="${PRODUCT_CODE}-db"
          ENV_FILE="$(cd "$REPO_DIR/.." && pwd)/etc/.env"
          run() { docker exec -i "$CONT" psql -U postgres -d "$DB" -v ON_ERROR_STOP=1 "$@"; }

          # Service-role password. The role is created LOGIN-only (no password) by
          # 97_service_role.sql; the app connects as atlas_svc over TCP (scram),
          # so the role needs a password matching the operator .env's DATABASE_URL
          # (postgresql://atlas_svc:PASSWORD@host...). Parse it here - it lives only
          # on the host and never transits CI. Empty if the URL carries no password.
          svc_pw=""
          if [ -f "$ENV_FILE" ]; then
            db_url="$(grep -E '^DATABASE_URL=' "$ENV_FILE" | head -1 | sed 's/^DATABASE_URL=//')"
            db_url="${db_url%\"}"; db_url="${db_url#\"}"
            creds="${db_url#*://}"; creds="${creds%%@*}"
            case "$creds" in *:*) svc_pw="${creds#*:}" ;; esac
          fi

          if [ "$ACTION" = "verify" ]; then
            echo "[db-init] atlas schema tables:"
            run -c "SELECT table_schema||'.'||table_name FROM information_schema.tables WHERE table_schema IN ('model','key','reqlog','routing') ORDER BY 1;"
            echo "[db-init] service role state:"
            run -c "SELECT rolname, rolcanlogin, (rolpassword IS NOT NULL) AS has_password FROM pg_roles WHERE rolname = 'atlas_svc';"
            if [ -n "$svc_pw" ]; then echo "[db-init] .env DATABASE_URL carries a svc password: yes"; else echo "[db-init] .env DATABASE_URL carries a svc password: no"; fi
            exit 0
          fi

          for f in database/ddl/00_baseline.sql database/ddl/97_service_role.sql database/ddl/98_column_locks.sql; do
            echo "[db-init] applying $f"
            run -f "$f"
          done
          shopt -s nullglob
          for f in database/ddl/incr/*.sql; do
            echo "[db-init] applying incr $(basename "$f")"
            run -f "$f"
          done

          # Give the service role its password so the app can authenticate. Source
          # of truth is the operator .env's DATABASE_URL. If it has none yet,
          # generate one, patch DATABASE_URL in place (600 file, host-only), and
          # bounce the app so it reconnects with the new URL.
          if [ -z "$svc_pw" ]; then
            svc_pw="$(openssl rand -hex 24 2>/dev/null || head -c 18 /dev/urandom | od -An -tx1 | tr -d ' \n')"
            if [ ! -f "$ENV_FILE" ]; then
              echo "[db-init] ERROR: $ENV_FILE not found; cannot persist svc password" >&2
              exit 1
            fi
            sed -i -E "s#(^DATABASE_URL=\"?postgresql://atlas_svc:)[^@]*@#\1${svc_pw}@#" "$ENV_FILE"
            echo "[db-init] no svc password in .env; generated one and patched DATABASE_URL"
            docker restart "${PRODUCT_CODE}-app" >/dev/null 2>&1 || true
          fi
          # Pipe the ALTER over stdin (never argv) so the password stays out of ps.
          esc="$(printf '%s' "$svc_pw" | sed "s/'/''/g")"
          printf "ALTER ROLE atlas_svc PASSWORD '%s';\n" "$esc" | run
          echo "[db-init] service-role password set"

          # Post-apply assertion. Every statement in the DDL is IF NOT EXISTS, so
          # applying the WRONG file succeeds silently and reports done - compare
          # what the pinned DDL declares against what the database now has, and
          # fail loudly on a shortfall (see docs/60-operations/10-tech-debt.md for
          # the incident that motivated this in the reference implementation).
          declared_list="$(grep -oiE 'CREATE TABLE( IF NOT EXISTS)?[[:space:]]+[a-z_]+\.[a-z_]+' database/ddl/00_baseline.sql | awk '{print tolower($NF)}' | sort -u)"
          declared_n="$(echo "$declared_list" | grep -c .)"
          in_list="$(echo "$declared_list" | sed "s/.*/'&'/" | paste -sd, -)"
          present_n="$(run -tAc "SELECT count(*) FROM information_schema.tables WHERE table_schema||'.'||table_name IN ($in_list);")"
          echo "[db-init] pinned baseline declares $declared_n tables; $present_n of them exist"
          if [ "$present_n" -lt "$declared_n" ]; then
            echo "[db-init] ERROR: the applied DDL did not take effect." >&2
            echo "[db-init] Missing:" >&2
            run -tAc "SELECT x FROM unnest(ARRAY[$in_list]) AS x WHERE x NOT IN (SELECT table_schema||'.'||table_name FROM information_schema.tables);" >&2
            exit 1
          fi

          echo "[db-init] done."
          rm -rf "$DDL_STAGE"
          REMOTE_SCRIPT
          scp -i ~/.ssh/deploy_key -P "$port" -o ConnectTimeout=30 /tmp/db-init.sh "$DEPLOY_USER@$DEPLOY_HOST:/tmp/db-init.sh"
          printf '%s\n' "REPO_DIR=$(printf %q "$deploy_dir") DDL_STAGE=$(printf %q "$ddl_stage") PINNED_SHA=$(printf %q "$PINNED_SHA") ACTION=$(printf %q "$ACTION") PRODUCT_CODE=$(printf %q "$PRODUCT_CODE") bash /tmp/db-init.sh" \
            | ssh "${ssh_opts[@]}" "$DEPLOY_USER@$DEPLOY_HOST" bash -s
