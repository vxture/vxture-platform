# vxture.com — 官网/注册/登录（website portal → vx-website:3000）
# resolver 127.0.0.11 使容器名在请求时解析，容器不存在时返回 502 而不是启动失败

server {
    listen 80;
    listen [::]:80;
    server_name www.vxture.com;
    return 301 https://vxture.com$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name www.vxture.com;
    ssl_certificate     /etc/nginx/ssl/live/vxture.com/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/live/vxture.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_session_cache   shared:SSL:10m;
    return 301 https://vxture.com$request_uri;
}

server {
    listen 80;
    listen [::]:80;
    server_name vxture.com;
    return 301 https://vxture.com$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name vxture.com;

    ssl_certificate     /etc/nginx/ssl/live/vxture.com/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/live/vxture.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options           SAMEORIGIN always;
    add_header X-Content-Type-Options    nosniff always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;

    resolver 127.0.0.11 valid=10s ipv6=off;

    location /_next/static/ {
        set $upstream vx-website:3000;
        proxy_pass         http://$upstream;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_buffering    on;
        add_header         Cache-Control "public, max-age=31536000, immutable";
    }

    location / {
        set $upstream vx-website:3000;
        proxy_pass         http://$upstream;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        '';
    }
}
