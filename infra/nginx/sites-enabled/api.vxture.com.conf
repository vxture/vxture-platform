# api.vxture.com — 公共 API 入口（gateway-bff → vx-gateway-bff:8000）

server {
    listen 80;
    listen [::]:80;
    server_name api.vxture.com;
    return 301 https://api.vxture.com$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name api.vxture.com;

    ssl_certificate     /etc/nginx/ssl/live/vxture.com/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/live/vxture.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options    nosniff always;

    client_max_body_size 50M;
    resolver 127.0.0.11 valid=10s ipv6=off;

    location / {
        set $upstream vx-gateway-bff:8000;
        proxy_pass         http://$upstream;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cookie_path  / "/; SameSite=None; Secure";
    }
}
