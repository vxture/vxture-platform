# deploy/compose.platform.yml
# 平台控制面（不含 nginx，nginx 由 compose.nginx.yml 独立管理）
# 服务器工作目录：/srv/vxture/deploy/
# 真实运行参数目录：/srv/vxture/runtime/
# 使用：docker compose -f compose.platform.yml up -d
#
# 前置：
#   1. bash scripts/13-prepare-runtime-env.sh  （准备 /srv/vxture/runtime 并生成 env 与 secrets）
#   2. 手动补全 /srv/vxture/runtime 下的 CHANGEME 字段

name: vx-platform

networks:
  vxture-prod:
    external: true # nginx 容器已在此网络，平台服务加入即可互通

services:
  # ── 数据层 ──────────────────────────────────────────────────────────────────

  postgres:
    # Pinned by digest to prevent upstream 18-alpine tag drift from silently
    # recreating the stateful DB on pull. Bump tag+digest together to upgrade.
    # 18-alpine digest resolved 2026-06-09.
    image: postgres:18-alpine@sha256:96d56f7f57c6aacd1fcb908bc83b345ec5f83231ee486dd66a1baadce274db88
    container_name: vx-platform-pg
    restart: unless-stopped
    # Ceiling only (steady state ~40-100MB/container; whole host ~900MB). Stateful:
    # NOT pinned to no-swap (no memswap_limit) so it can lean on swap under pressure
    # rather than be OOM-killed — a killed pg cascades (all BFF depend_on it).
    # Owner: verify against `docker stats` on worker-01 before trusting this value.
    mem_limit: 512m
    networks: [vxture-prod]
    environment:
      POSTGRES_USER: vxture
      POSTGRES_DB: platform_main
      POSTGRES_PASSWORD_FILE: /run/secrets/platform_pg_password
    secrets: [platform_pg_password]
    volumes:
      - /srv/vxture/data/platform-pg:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vxture -d platform_main"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    # Pinned by digest (see postgres note). 8-alpine digest resolved 2026-06-09.
    image: redis:8-alpine@sha256:09160599abd229764c0fb44cb6be640294e1d360a54b19985ab4843dcf2d90f1
    container_name: vx-platform-redis
    restart: unless-stopped
    # --maxmemory 96mb (below this 128m ceiling) makes redis self-evict before the
    # cgroup OOM-kills it. volatile-lru only evicts TTL-bearing keys (all session/
    # token/rate-limit keys have TTLs) — an evicted idle session (user re-logs in)
    # beats redis being OOM-killed and losing every session.
    mem_limit: 128m
    networks: [vxture-prod]
    secrets: [platform_redis_password]
    volumes:
      - /srv/vxture/data/platform-redis:/data
    command:
      [
        "sh",
        "-c",
        'redis-server --appendonly yes --maxmemory 96mb --maxmemory-policy volatile-lru --requirepass "$$(cat /run/secrets/platform_redis_password)"',
      ]
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'redis-cli -a "$$(cat /run/secrets/platform_redis_password)" ping',
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── 门户层 ──────────────────────────────────────────────────────────────────

  website:
    image: ${VX_IMAGE_REGISTRY:-ghcr.io}/${VX_IMAGE_NAMESPACE:-vxture}/platform_website:${VX_IMAGE_TAG:-latest}
    container_name: vx-platform-website
    restart: unless-stopped
    mem_limit: 256m
    memswap_limit: 256m # == mem_limit: no swap, so a runaway dies at its own ceiling instead of eating host swap
    networks: [vxture-prod]
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: https://api.vxture.com
      NODE_OPTIONS: --max-old-space-size=192
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  console:
    image: ${VX_IMAGE_REGISTRY:-ghcr.io}/${VX_IMAGE_NAMESPACE:-vxture}/platform_console:${VX_IMAGE_TAG:-latest}
    container_name: vx-platform-console
    restart: unless-stopped
    mem_limit: 256m
    memswap_limit: 256m
    networks: [vxture-prod]
    environment:
      NODE_ENV: production
      PORT: "3020"
      NEXT_PUBLIC_API_URL: https://api.vxture.com
      NODE_OPTIONS: --max-old-space-size=192
      # Server-only internal address the console SSR uses to fetch the session
      # snapshot from console-bff (same Docker network). Non-secret; the browser
      # keeps using the public same-origin path. See lib/server/bff-server.ts (#7).
      CONSOLE_BFF_INTERNAL_URL: http://vx-platform-console-bff:3021
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:3020/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  admin:
    image: ${VX_IMAGE_REGISTRY:-ghcr.io}/${VX_IMAGE_NAMESPACE:-vxture}/platform_admin:${VX_IMAGE_TAG:-latest}
    container_name: vx-platform-admin
    restart: unless-stopped
    mem_limit: 256m
    memswap_limit: 256m
    networks: [vxture-prod]
    environment:
      NODE_ENV: production
      PORT: "3040"
      NEXT_PUBLIC_API_URL: https://api.vxture.com
      NODE_OPTIONS: --max-old-space-size=192
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:3040/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  # 中立身份门面（OIDC 登录 UI）。nginx accounts.vxture.com 把 /oidc/* + /.well-known/*
  # 反代到 vx-platform-auth-bff（内部），其余到本前端。见 docs/design/identity-sso-login-surface.md。
  accounts:
    image: ${VX_IMAGE_REGISTRY:-ghcr.io}/${VX_IMAGE_NAMESPACE:-vxture}/platform_accounts:${VX_IMAGE_TAG:-latest}
    container_name: vx-platform-accounts
    restart: unless-stopped
    mem_limit: 256m
    memswap_limit: 256m
    networks: [vxture-prod]
    environment:
      NODE_ENV: production
      PORT: "3060"
      NEXT_PUBLIC_OIDC_API_BASE: https://accounts.vxture.com
      NODE_OPTIONS: --max-old-space-size=192
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:3060/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  # ── 平台 BFF 层 ─────────────────────────────────────────────────────────────

  auth-bff:
    image: ${VX_IMAGE_REGISTRY:-ghcr.io}/${VX_IMAGE_NAMESPACE:-vxture}/platform_bff-auth:${VX_IMAGE_TAG:-latest}
    container_name: vx-platform-auth-bff
    restart: unless-stopped
    mem_limit: 192m
    memswap_limit: 192m
    networks: [vxture-prod]
    ports:
      - "100.100.197.42:3061:3061" # 绑定 Tailscale 接口，仅 Tailscale 对端可达（原3090，2026-07-24 L0端口迁移）
    # Overrides any NODE_OPTIONS from env_file (inline wins). Owner: confirm no
    # host .env.* already sets NODE_OPTIONS flags that would be clobbered.
    environment:
      NODE_OPTIONS: --max-old-space-size=144
      AUTH_BFF_PORT: "3061"
    env_file:
      [
        /srv/vxture/runtime/secrets/platform.env,
        /srv/vxture/runtime/secrets/platform-app.env,
        /srv/vxture/runtime/secrets/platform-mail.env,
        /srv/vxture/runtime/secrets/platform-sms.env,
        /srv/vxture/runtime/secrets/platform-identity.env,
        /srv/vxture/runtime/.env.auth-bff,
      ]
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:3061/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  gateway-bff:
    image: ${VX_IMAGE_REGISTRY:-ghcr.io}/${VX_IMAGE_NAMESPACE:-vxture}/platform_bff-gateway:${VX_IMAGE_TAG:-latest}
    container_name: vx-platform-gateway-bff
    restart: unless-stopped
    mem_limit: 128m
    memswap_limit: 128m
    networks: [vxture-prod]
    environment:
      NODE_OPTIONS: --max-old-space-size=96
    env_file: /srv/vxture/runtime/.env.gateway-bff
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  website-bff:
    image: ${VX_IMAGE_REGISTRY:-ghcr.io}/${VX_IMAGE_NAMESPACE:-vxture}/platform_bff-website:${VX_IMAGE_TAG:-latest}
    container_name: vx-platform-website-bff
    restart: unless-stopped
    mem_limit: 192m
    memswap_limit: 192m
    networks: [vxture-prod]
    environment:
      NODE_OPTIONS: --max-old-space-size=144
      WEBSITE_BFF_PORT: "3001"
    env_file:
      [
        /srv/vxture/runtime/secrets/platform.env,
        /srv/vxture/runtime/secrets/platform-app.env,
        /srv/vxture/runtime/secrets/platform-mail.env,
        /srv/vxture/runtime/.env.website-bff,
      ]
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
      auth-bff: { condition: service_healthy }
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:3001/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  model-platform:
    image: ${VX_IMAGE_REGISTRY:-ghcr.io}/${VX_IMAGE_NAMESPACE:-vxture}/platform_service-model-platform:${VX_IMAGE_TAG:-latest}
    container_name: vx-platform-model-platform
    restart: unless-stopped
    mem_limit: 256m
    memswap_limit: 256m
    networks: [vxture-prod]
    environment:
      NODE_OPTIONS: --max-old-space-size=192
    # 绑 worker-01 tailscale IP，把 LLM 网关暴露给 tailnet（worker-02 varda-server 消费）。
    # 仅 100.100.197.42（tailscale0）可达，不绑 0.0.0.0 公网。见 docs/deployment/varda-worker-02-runbook.md §3。
    ports: ["100.100.197.42:3100:3100"]
    env_file:
      [
        /srv/vxture/runtime/secrets/platform.env,
        /srv/vxture/runtime/secrets/platform-app.env,
        /srv/vxture/runtime/.env.model-platform,
      ]
    depends_on:
      postgres: { condition: service_healthy }
    healthcheck:
      test:
        ["CMD", "curl", "-fsS", "http://127.0.0.1:3100/model-platform/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  console-bff:
    image: ${VX_IMAGE_REGISTRY:-ghcr.io}/${VX_IMAGE_NAMESPACE:-vxture}/platform_bff-console:${VX_IMAGE_TAG:-latest}
    container_name: vx-platform-console-bff
    restart: unless-stopped
    mem_limit: 192m
    memswap_limit: 192m
    networks: [vxture-prod]
    environment:
      NODE_OPTIONS: --max-old-space-size=144
    env_file:
      [
        /srv/vxture/runtime/secrets/platform.env,
        /srv/vxture/runtime/secrets/platform-app.env,
        /srv/vxture/runtime/secrets/platform-mail.env,
        /srv/vxture/runtime/secrets/platform-sms.env,
        /srv/vxture/runtime/.env.console-bff,
      ]
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
      auth-bff: { condition: service_healthy }
      model-platform: { condition: service_healthy }
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:3021/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  admin-bff:
    image: ${VX_IMAGE_REGISTRY:-ghcr.io}/${VX_IMAGE_NAMESPACE:-vxture}/platform_bff-admin:${VX_IMAGE_TAG:-latest}
    container_name: vx-platform-admin-bff
    restart: unless-stopped
    mem_limit: 192m
    memswap_limit: 192m
    networks: [vxture-prod]
    environment:
      NODE_OPTIONS: --max-old-space-size=144
      ADMIN_BFF_PORT: "3043"
    env_file:
      [
        /srv/vxture/runtime/secrets/platform.env,
        /srv/vxture/runtime/secrets/platform-app.env,
        /srv/vxture/runtime/secrets/platform-mail.env,
        /srv/vxture/runtime/.env.admin-bff,
      ]
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
      auth-bff: { condition: service_healthy }
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:3043/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # Product-facing S2S host (product_310 D13): C2 entitlements/visible-set +
  # C3 consume/gauge + commerce jobs (provisioning dispatch, expiry sweeps).
  # No host ports — products reach it only through the nginx internal alias
  # (compose.nginx.yml tailnet-bound listener → vx-platform-api:3041).
  platform-api:
    image: ${VX_IMAGE_REGISTRY:-ghcr.io}/${VX_IMAGE_NAMESPACE:-vxture}/platform_bff-platform-api:${VX_IMAGE_TAG:-latest}
    container_name: vx-platform-api
    restart: unless-stopped
    mem_limit: 192m
    memswap_limit: 192m # owner: verify RSS — this one runs commerce cron jobs (dispatch/expiry sweeps)
    networks: [vxture-prod]
    environment:
      NODE_OPTIONS: --max-old-space-size=144
    env_file:
      [
        /srv/vxture/runtime/secrets/platform.env,
        /srv/vxture/runtime/secrets/platform-app.env,
        /srv/vxture/runtime/.env.platform-api,
      ]
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
      auth-bff: { condition: service_healthy }
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:3041/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

secrets:
  platform_pg_password:
    file: /srv/vxture/runtime/secrets/pg-password
  platform_redis_password:
    file: /srv/vxture/runtime/secrets/redis-password
