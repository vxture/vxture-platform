# deploy/worker-02/compose.varda.yml
# Varda 助手栈（worker-02，独立业务箱；不属 worker-01 平台控制面）
# 服务：varda-bff(3121) + varda-server(3122) + 自带 varda-pg / varda-redis
# 使用：docker compose -f compose.varda.yml up -d
#
# 拓扑（详见 docs/deployment/varda-worker-02-runbook.md）：
#   - nginx(worker-01) 的 /varda/ 直连 100.76.219.48:3121（本栈 varda-bff，须发布到 0.0.0.0，UFW 仅放行 Tailscale 子网）
#   - varda-server → model-platform(worker-01) 是唯一跨主机硬依赖（LLM 网关），经 MODEL_PLATFORM_URL 配置
#   - varda-pg / varda-redis 为本栈私有（Vela* 会话表 + jti 撤销黑名单），数据自包含
#   - JWT_SECRET 与平台会话签名同值（owner 转运），用于验 admin/console cookie
#
# 前置：./.env.varda-bff / ./.env.varda-server / pg 密码须在 worker-02 本机备好（见 runbook §2）

name: vx-varda

networks:
  vx-varda:
    driver: bridge

volumes:
  varda-pg:
  varda-redis:

services:
  varda-pg:
    # Tag reference (NOT digest-pinned like worker-01): worker-02 is a mainland box
    # whose docker.io access runs through registry mirrors that throttle by-digest
    # blob pulls (observed: 30min+ for one image). The image content is preloaded
    # from worker-01 via docker save/load (same digest content); pull_policy
    # missing keeps deploys from re-pulling docker.io every time.
    image: postgres:18-alpine
    pull_policy: missing
    container_name: vx-varda-pg
    restart: unless-stopped
    networks: [vx-varda]
    environment:
      POSTGRES_USER: varda
      POSTGRES_DB: varda
      POSTGRES_PASSWORD_FILE: /run/secrets/varda_pg_password
    secrets: [varda_pg_password]
    volumes:
      - varda-pg:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U varda -d varda"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  varda-redis:
    # Tag reference + preload, same rationale as varda-pg above.
    image: redis:8-alpine
    pull_policy: missing
    container_name: vx-varda-redis
    restart: unless-stopped
    networks: [vx-varda]
    volumes:
      - varda-redis:/data
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  varda-server:
    image: ${VX_IMAGE_REGISTRY:-ghcr.io}/${VX_IMAGE_NAMESPACE:-vxture}/varda_agent:${VX_IMAGE_TAG:-latest}
    container_name: vx-varda-server
    restart: unless-stopped
    networks: [vx-varda]
    env_file: [./.env.varda-server]
    depends_on:
      varda-pg: { condition: service_healthy }
    # varda-server 无 /health 端点 → TCP 探活 3122
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('net').connect(3122,'127.0.0.1').on('connect',()=>process.exit(0)).on('error',()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  varda-bff:
    image: ${VX_IMAGE_REGISTRY:-ghcr.io}/${VX_IMAGE_NAMESPACE:-vxture}/varda_bff:${VX_IMAGE_TAG:-latest}
    container_name: vx-varda-bff
    restart: unless-stopped
    networks: [vx-varda]
    # 发布到 0.0.0.0 供 worker-01 nginx 经 Tailscale 直连；UFW 限制仅 Tailscale 子网可达
    ports: ["3121:3121"]
    env_file: [./.env.varda-bff]
    depends_on:
      varda-redis: { condition: service_healthy }
      varda-server: { condition: service_started }
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3121/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

secrets:
  varda_pg_password:
    file: ./secrets/varda-pg-password
