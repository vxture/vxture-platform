# Varda BFF SSE 路由
# 包含此 snippet 的 server block（admin / console）的 /varda/* 请求
# 经 Tailscale 内网直连 vx-worker-02 的 varda-bff（100.76.219.48:3080）
#
# SSE 要求必须关闭 buffering，否则 token 流无法实时到达浏览器。
# varda-bff 的 compose 端口需绑定 0.0.0.0（UFW 限制仅 Tailscale 子网可达）。

location /varda/ {
    proxy_pass         http://100.76.219.48:3080;
    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_set_header   Connection        '';
    proxy_buffering    off;
    proxy_cache        off;
    proxy_read_timeout 300s;
}
