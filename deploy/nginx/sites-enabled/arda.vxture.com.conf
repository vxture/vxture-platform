# arda.vxture.com / beta-arda.vxture.com — Arda AI assistant (vx-worker-02 via Tailscale)
#
# Arda runs on vx-worker-02 (no public IP). deploy nginx proxies via Tailscale:
#   Tailscale IP   : 100.76.219.48
#   arda-app (prod): port 3230   # single Next.js standalone service with embedded API
#   arda-beta-app  : port 3231   # single Next.js standalone service with embedded API
#
# Mode A same-site OIDC: /auth/* and /api/* route to arda-app so vx_rp_session
# cookie is set at the arda.vxture.com origin (identity-access-topology.md §4).
# All Tailscale upstreams are static IPs — no Docker resolver needed.

server {
    listen 80;
    listen [::]:80;
    server_name arda.vxture.com;
    return 301 https://arda.vxture.com$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name arda.vxture.com;

    ssl_certificate     /etc/nginx/ssl/live/vxture.com/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/live/vxture.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Frame-Options           SAMEORIGIN always;
    add_header X-Content-Type-Options    nosniff always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;

    location /_next/static/ {
        proxy_pass         http://100.76.219.48:3230;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_buffering    on;
        add_header         Cache-Control "public, max-age=31536000, immutable";
    }

    location = /api/health {
        proxy_pass         http://100.76.219.48:3230;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location /auth/ {
        proxy_pass         http://100.76.219.48:3230;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Internal-only job trigger (arda-plat-220 B2 / product_230 §3): never
    # publicly reachable. The app-side guard is defense in depth; the edge
    # 404s it outright. NOTE: /provisioning/webhook stays on the public edge
    # until ARDA_WEBHOOK_BASE_URL points deliveries at the tailnet (P0 window)
    # -- do not 404 it before that switch or deliveries break.
    location = /api/usage/flush {
        return 404;
    }

    location /api/ {
        client_max_body_size 5m;
        proxy_pass         http://100.76.219.48:3230;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass         http://100.76.219.48:3230;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        '';
    }
}

