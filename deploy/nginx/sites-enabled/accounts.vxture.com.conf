# accounts.vxture.com — 中立身份门面（唯一公开身份域 = OIDC issuer + 登录/账号 UI）
#   /oidc/* + /.well-known/openid-configuration → vx-platform-auth-bff:3090（内部 IdP，无公开 auth 域）
#   其余（/login、/、/_next/static/、/api/health） → vx-platform-accounts:3000（accounts 前端）
# 登录页与登录端点同源 → 免 CORS。见 docs/design/identity-sso-login-surface.md。

server {
    listen 80;
    listen [::]:80;
    server_name accounts.vxture.com;
    return 301 https://accounts.vxture.com$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name accounts.vxture.com;

    # 复用 *.vxture.com 证书（与 console/admin 同）。
    ssl_certificate     /etc/nginx/ssl/live/vxture.com/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/live/vxture.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Frame-Options           SAMEORIGIN always;
    add_header X-Content-Type-Options    nosniff always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;

    client_max_body_size 2M;
    resolver 127.0.0.11 valid=10s ipv6=off;

    # ── OIDC 协议端点 → 内部 auth-bff（auth 无公开主机名）──────────────────────
    location /oidc/ {
        set $upstream vx-platform-auth-bff:3090;
        proxy_pass         http://$upstream;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location = /.well-known/openid-configuration {
        set $upstream vx-platform-auth-bff:3090;
        proxy_pass         http://$upstream;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── 非协议 auth 端点 → 内部 auth-bff（与登录页同源，免 CORS）─────────────────
    # /auth/oauth/* 社交联邦 start/callback/bind-phone（Batch 16d）、
    # /auth/send-phone-code（手机码）、/auth/forgot-password、/auth/reset-password（16c）。
    location /auth/ {
        set $upstream vx-platform-auth-bff:3090;
        proxy_pass         http://$upstream;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── 当前用户 profile（含头像上传 PUT /api/me/avatar）→ 内部 auth-bff ──────────
    # vx_sid 会话鉴权；上传上限 5M（覆盖 server 级 2M）。identity-avatar.md §6。
    location /api/me/ {
        client_max_body_size 5m;
        set $upstream vx-platform-auth-bff:3090;
        proxy_pass         http://$upstream;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── 自定义头像服务 → 内部 auth-bff（公开、版本化强缓存；identity-avatar.md §5）──
    location /avatar/ {
        set $upstream vx-platform-auth-bff:3090;
        proxy_pass         http://$upstream;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── accounts 前端 ───────────────────────────────────────────────────────────
    location /_next/static/ {
        set $upstream vx-platform-accounts:3000;
        proxy_pass         http://$upstream;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_buffering    on;
        add_header         Cache-Control "public, max-age=31536000, immutable";
    }

    location / {
        set $upstream vx-platform-accounts:3000;
        proxy_pass         http://$upstream;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        '';
    }
}
