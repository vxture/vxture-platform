# admin.vxture.com — 运营后台（vx-admin:3000）
# /varda/* 经 Tailscale 直连 vx-worker-02 varda-bff（100.76.219.48:3121）

server {
    listen 80;
    listen [::]:80;
    server_name admin.vxture.com;
    return 301 https://admin.vxture.com$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name admin.vxture.com;

    ssl_certificate     /etc/nginx/ssl/live/vxture.com/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/live/vxture.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Frame-Options           SAMEORIGIN always;
    add_header X-Content-Type-Options    nosniff always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;

    # Varda SSE — 直连 Tailscale IP，无需 resolver
    location /varda/ {
        proxy_pass         http://100.76.219.48:3121;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        '';
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 300s;
    }

    resolver 127.0.0.11 valid=10s ipv6=off;

    location /_next/static/ {
        set $upstream vx-admin:3000;
        proxy_pass         http://$upstream;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_buffering    on;
        add_header         Cache-Control "public, max-age=31536000, immutable";
    }

    # ── OIDC RP（/auth/*）+ admin-bff 数据 API（/api/*）→ 同源到 admin-bff ──
    # admin 是 operator-realm 的 OIDC RP；/auth/login + /auth/callback 必须到
    # admin-bff，否则 IdP 回调落到前端导致登录死循环。vx_rp_session cookie 与
    # portal 同源（identity-access-topology.md §4）。/api/health 是 portal 自身
    # 容器健康检查路由，精确避让到前端。
    location = /api/health {
        set $upstream vx-admin:3000;
        proxy_pass         http://$upstream;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location /auth/ {
        set $adminbff vx-admin-bff:3031;
        proxy_pass         http://$adminbff;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location /api/ {
        set $adminbff vx-admin-bff:3031;
        proxy_pass         http://$adminbff;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location / {
        set $upstream vx-admin:3000;
        proxy_pass         http://$upstream;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        '';
    }
}
