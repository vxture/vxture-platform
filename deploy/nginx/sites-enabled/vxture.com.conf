# vxture.com — 官网/注册/登录（website portal → vx-platform-website:3000）
# resolver 127.0.0.11 使容器名在请求时解析，容器不存在时返回 502 而不是启动失败

server {
    listen 80;
    listen [::]:80;
    server_name www.vxture.com;
    return 301 https://vxture.com$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name www.vxture.com;
    ssl_certificate     /etc/nginx/ssl/live/vxture.com/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/live/vxture.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_session_cache   shared:SSL:10m;
    return 301 https://vxture.com$request_uri;
}

server {
    listen 80;
    listen [::]:80;
    server_name vxture.com;
    return 301 https://vxture.com$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name vxture.com;

    ssl_certificate     /etc/nginx/ssl/live/vxture.com/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/live/vxture.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options           SAMEORIGIN always;
    add_header X-Content-Type-Options    nosniff always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;

    resolver 127.0.0.11 valid=10s ipv6=off;

    # ^~ so the long-cache asset regex below never shadows hashed assets
    # (which keep the stronger immutable header).
    location ^~ /_next/static/ {
        set $upstream vx-platform-website:3000;
        proxy_pass         http://$upstream;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_buffering    on;
        add_header         Cache-Control "public, max-age=31536000, immutable";
    }

    # ── OIDC RP（/auth/*）+ website-bff 数据 API（/api/*）→ 同源到 website-bff ──
    # 让 vx_rp_session cookie 与 portal 同源（identity-access-topology.md §4，D-AT）。
    # /api/health 是 portal 自身的容器健康检查路由，精确避让到前端。
    location = /api/health {
        set $upstream vx-platform-website:3000;
        proxy_pass         http://$upstream;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location /auth/ {
        set $websitebff vx-platform-website-bff:3011;
        proxy_pass         http://$websitebff;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location /api/ {
        set $websitebff vx-platform-website-bff:3011;
        proxy_pass         http://$websitebff;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Long-cache un-hashed public assets (images/fonts/favicon served from the
    # app's /public). Only image/font extensions — .js/.css live under
    # /_next/static (immutable, ^~). No /api/* or /auth/* URL ends in these
    # extensions, so this regex never shadows a backend route.
    location ~* \.(?:ico|png|jpe?g|gif|webp|avif|svg|woff2?)$ {
        set $upstream vx-platform-website:3000;
        proxy_pass         http://$upstream;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_buffering    on;
        # Replace (not append to) any Cache-Control the app sets for /public
        # assets, so the client gets a single, correct value.
        proxy_hide_header  Cache-Control;
        add_header         Cache-Control "public, max-age=604800";
    }

    location / {
        set $upstream vx-platform-website:3000;
        proxy_pass         http://$upstream;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        '';
    }
}
