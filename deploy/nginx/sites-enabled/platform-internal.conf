# platform-internal — 产品面 S2S 内网别名(product_310 D13 / arda 回函 06 §5.2)
#
# 监听 8080,该端口在 compose.nginx.yml 仅绑定 Tailscale 接口
# (100.100.197.42:8080),公网不可达——接口绑定即访问控制,无需 IP ACL。
# 产品侧 PLATFORM_API_URL 指向 http://100.100.197.42:8080,此后平台任意
# 重构拓扑(换宿主/换端口/拆服务)只改本文件,产品零改动。
#
# 路由面 = 三通道产品自助端点(与 platform-api 宿主一一对应):
#   /platform/*  → C2 entitlements + sharing visible-set
#   /usage/*     → C3 consume / gauge
# 其余路径一律 404(公网 nginx 本就不路由这些前缀,边界对称)。

server {
    listen 8080;
    server_name _;

    resolver 127.0.0.11 valid=10s ipv6=off;

    location /platform/ {
        set $upstream vx-platform-api:3041;
        proxy_pass         http://$upstream;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    }

    location /usage/ {
        set $upstream vx-platform-api:3041;
        proxy_pass         http://$upstream;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    }

    # Alias-level liveness (proxied to the host's /healthz).
    location = /healthz {
        set $upstream vx-platform-api:3041;
        proxy_pass         http://$upstream;
        proxy_http_version 1.1;
    }

    location / {
        return 404;
    }
}
