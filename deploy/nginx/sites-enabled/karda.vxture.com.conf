# karda.vxture.com — Karda knowledge platform (vx-worker-02 via Tailscale)
#
# karda runs on vx-worker-02 (no public IP). deploy nginx proxies via Tailscale:
#   Tailscale IP : 100.76.219.48
#   karda-app    : port 3233   # single Next.js standalone service with embedded API
#
# Same shape as arda.vxture.com.conf / vxtpl.vxture.com.conf (domain/port
# swapped): all Tailscale upstreams are static IPs — no Docker resolver needed.
# Source artifact owned by vxture-karda repo: configs/edge/karda.vxture.com.conf
# (docs/80-liaison/40-2607230909-karda-platform-registration-b.md §3.1). Only
# the prod server block — karda-beta is deferred (TD-001, no beta host yet).

server {
    listen 80;
    listen [::]:80;
    server_name karda.vxture.com;
    return 301 https://karda.vxture.com$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name karda.vxture.com;

    ssl_certificate     /etc/nginx/ssl/live/vxture.com/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/live/vxture.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Frame-Options           SAMEORIGIN always;
    add_header X-Content-Type-Options    nosniff always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;

    client_max_body_size 25m;

    location /_next/static/ {
        proxy_pass         http://100.76.219.48:3233;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_buffering    on;
        add_header         Cache-Control "public, max-age=31536000, immutable";
    }

    location = /api/health {
        proxy_pass         http://100.76.219.48:3233;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location /auth/ {
        proxy_pass         http://100.76.219.48:3233;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Internal-only job trigger: never publicly reachable (edge 404 = defense
    # in depth on top of the app-side guard; same policy as arda/vxtpl).
    location = /api/usage/flush {
        return 404;
    }

    location /api/ {
        client_max_body_size 5m;
        proxy_pass         http://100.76.219.48:3233;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass         http://100.76.219.48:3233;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        '';
    }
}
