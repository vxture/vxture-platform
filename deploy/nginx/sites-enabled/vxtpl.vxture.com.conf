# vxtpl.vxture.com — vxture-template demo product (vx-worker-02 via Tailscale)
#
# vxtpl runs on vx-worker-02 (no public IP). deploy nginx proxies via Tailscale:
#   Tailscale IP : 100.76.219.48
#   vxtpl-app    : port 3232   # single Next.js standalone service with embedded API
#
# Same shape as arda.vxture.com.conf (domain/port swapped): all Tailscale
# upstreams are static IPs — no Docker resolver needed. Authoritative template
# source: vxture-template configs/edge/__PRODUCT_CODE__.vxture.com.conf.

server {
    listen 80;
    listen [::]:80;
    server_name vxtpl.vxture.com;
    return 301 https://vxtpl.vxture.com$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name vxtpl.vxture.com;

    ssl_certificate     /etc/nginx/ssl/live/vxture.com/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/live/vxture.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Frame-Options           SAMEORIGIN always;
    add_header X-Content-Type-Options    nosniff always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;

    client_max_body_size 25m;

    location /_next/static/ {
        proxy_pass         http://100.76.219.48:3232;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_buffering    on;
        add_header         Cache-Control "public, max-age=31536000, immutable";
    }

    location = /api/health {
        proxy_pass         http://100.76.219.48:3232;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location /auth/ {
        proxy_pass         http://100.76.219.48:3232;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Internal-only job trigger: never publicly reachable (edge 404 = defense
    # in depth on top of the app-side guard; same policy as arda).
    location = /api/usage/flush {
        return 404;
    }

    location /api/ {
        proxy_pass         http://100.76.219.48:3232;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass         http://100.76.219.48:3232;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        '';
    }
}
