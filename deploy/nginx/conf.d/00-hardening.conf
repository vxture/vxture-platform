# conf.d/00-hardening.conf — 源站滥用加固（http{} 级）
#
# 背景:*.vxture.com 已切灰色云(DNS-only),客户端直连源站、前面不再有
# Cloudflare 的 WAF / 限速 / DDoS 兜底。本文件在 nginx 层补最基本的护栏:
# 按客户端 IP 限请求速率 + 限并发连接,并缩短慢速请求超时(缓解 slowloris)。
#
# 文件名 00- 前缀确保在 main.conf(引入 server 块)之前加载,使 map / 限速
# zone 先于 server 块定义。
#
# 限速 key = 直连客户端 IP。⚠️ 前提:当前「全灰色云直连」,且源站未启用
# Cloudflare real_ip(nginx -T 已确认)。若日后把某域名切回橙色云(代理),
# 该域名流量将来自 Cloudflare 边缘 IP,所有真实用户会共用同一限速桶——届时
# 需为其启用 real_ip 信任层(deploy/nginx/snippets/cloudflare-realip.conf,
# real_ip_header CF-Connecting-IP)让 key 落到真实客户端,否则会误伤。
#
# 内部 S2S 监听器(:8080,仅绑 tailnet)经空 key 豁免:nginx 对空 key 不计数,
# 内部产品面流量(entitlements / usage,可能突发)绝不被限流。

map $server_port $vx_limit_key {
    default  $binary_remote_addr;
    8080     "";
}

limit_req_zone    $vx_limit_key zone=vx_perip:10m rate=50r/s;
limit_conn_zone   $vx_limit_key zone=vx_perip_conn:10m;

# 全局套用(server 块继承;:8080 因空 key 实际不受限)。
# burst=100 nodelay:首屏一次并发拉多个静态资源不误伤,持续超过 50r/s 才排队。
limit_req         zone=vx_perip burst=100 nodelay;
# 每 IP 并发连接上限。HTTP/2 多路复用下浏览器通常仅 1~数条连接,50 对共享
# NAT / 多标签 / SSE 长连接足够宽松,同时能挡单 IP 连接洪泛。
limit_conn        vx_perip_conn 50;
limit_req_status  429;
limit_conn_status 429;

# 慢速攻击(slowloris)缓解:请求头/体在两次读之间超过阈值即断开。
# 阈值是「两次读的间隔」而非上传总时长,正常(含大文件)上传持续有数据、
# 不受影响;只掐无数据滴灌式长占连接的攻击。
client_header_timeout 15s;
client_body_timeout   15s;
