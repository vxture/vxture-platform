name: docker-build

# 主干 + tag 触发：平台部署 tag（dev-*/beta-*/v*.*.*）→ build+push 到 ACR，
# 镜像 tag = github.ref_name（deploy.yml 按同名 tag 拉取部署）。
# 不再在 push main 上构建 :latest（避免首推/日常合并触发无谓构建；镜像只在部署 tag 上出）。
# **varda 已独立**：varda-* tag 走 deploy-varda.yml（自建 varda 镜像 + 部署 worker-02），
# 本 workflow 与 classify-changes 的平台 tag「全建」均排除 varda_*。

on:
  push:
    tags: ["dev-*", "beta-*", "v*.*.*"]

permissions:
  contents: read
  packages: write # 推送到 GHCR 需要

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # B10: 前置变更检测，一次算出本次需重建的镜像集合（动态 matrix）。docs/scripts-only 或
  # 仅改无关路径时 include 为空 → build job 整体跳过（不再 spin 全部镜像腿）；改单包时
  # 只起受影响的腿。镜像构建配置来自 scripts/workflows/images.mjs（单一数据源）。
  # 同时产出 deployability artifact 供 deploy-production 的 gate 门控（B9）——即便 build
  # 被跳过也保证 artifact 存在，避免 gate fail-open 误部署。
  detect:
    name: Detect images
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.detect.outputs.matrix }}
      any: ${{ steps.detect.outputs.any }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Resolve build matrix + deployability
        id: detect
        env:
          BASE_SHA: ${{ github.event.before }}
          HEAD_SHA: ${{ github.sha }}
          GITHUB_REF: ${{ github.ref }}
          GITHUB_REF_TYPE: ${{ github.ref_type }}
        run: node scripts/workflows/classify-changes.mjs --matrix --base "$BASE_SHA" --head "$HEAD_SHA"

      - name: Write deployable flag
        run: echo "${{ steps.detect.outputs.deployable }}" > deployable.txt

      # 仅 main push 需要（tag 不触发 deploy-production）。
      - name: Upload deployability artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v7
        with:
          name: deployability
          path: deployable.txt
          retention-days: 5

  build:
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    needs: detect
    if: needs.detect.outputs.any == 'true'

    strategy:
      fail-fast: false # 一个镜像构建失败不中断其他镜像
      matrix: ${{ fromJSON(needs.detect.outputs.matrix) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      # B8: buildx setup 首发失败容错（基础设施抖动）；重试为幂等的全新 setup。
      - name: Set up Docker Buildx
        id: buildx
        continue-on-error: true
        uses: docker/setup-buildx-action@v4

      - name: Set up Docker Buildx (retry)
        if: steps.buildx.outcome == 'failure'
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve Aliyun ACR registry
        id: acr
        shell: bash
        env:
          # registry / internal-host 现为 org **variables**（ACR 迁 cn-beijing 后调整）。
          ALIYUN_ACR_REGISTRY: ${{ vars.ALIYUN_ACR_REGISTRY }}
          ALIYUN_ACR_INTERNAL_HOST: ${{ vars.ALIYUN_ACR_INTERNAL_HOST }}
          # namespace 是 org **variable**（非 secret）；用 secrets.* 会取到空 →
          # acr_enabled=false → 不推 ACR，断掉 deploy 的内网拉取。必须从 vars.* 取。
          ALIYUN_ACR_NAMESPACE: ${{ vars.ALIYUN_ACR_NAMESPACE }}
          ALIYUN_ACR_USERNAME: ${{ secrets.ALIYUN_ACR_USERNAME }}
          ALIYUN_ACR_PASSWORD: ${{ secrets.ALIYUN_ACR_PASSWORD }}
        run: bash scripts/workflows/resolve-acr-registry.sh

      - name: Log in to Aliyun ACR
        if: steps.acr.outputs.acr_enabled == 'true'
        shell: bash
        env:
          ACR_REGISTRY: ${{ steps.acr.outputs.acr_registry_public }}
          ALIYUN_ACR_USERNAME: ${{ secrets.ALIYUN_ACR_USERNAME }}
          ALIYUN_ACR_PASSWORD: ${{ secrets.ALIYUN_ACR_PASSWORD }}
        run: |
          set -euo pipefail
          echo "$ALIYUN_ACR_PASSWORD" | docker login "$ACR_REGISTRY" -u "$ALIYUN_ACR_USERNAME" --password-stdin

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ matrix.image }}
          tags: |
            # push main → :latest
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            # 部署 tag 的原样名（deploy.yml 用 github.ref_name 拉取）——必需：
            # semver 模式会把 v0.1.0 剥成 0.1.0，且 dev-*/beta-* 非 semver
            # 根本不产出版本 tag，只有 sha-。没有这行 deploy 会 image not found。
            type=raw,value=${{ github.ref_name }},enable=${{ github.ref_type == 'tag' }}
            # tag v1.2.3 → :1.2.3 :1.2 :1
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            # 每次 push 带 sha 方便回滚
            type=sha,prefix=sha-,format=short

      - name: Resolve image tags
        id: image-tags
        shell: bash
        env:
          ACR_ENABLED: ${{ steps.acr.outputs.acr_enabled }}
          ACR_IMAGE: ${{ steps.acr.outputs.acr_registry_public }}/${{ steps.acr.outputs.acr_namespace }}/${{ matrix.name }}
          METADATA_TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          set -euo pipefail

          tags="$METADATA_TAGS"

          if [ "$ACR_ENABLED" = "true" ]; then
            while IFS= read -r tag; do
              [ -z "$tag" ] && continue
              tag_name="${tag##*:}"
              tags="${tags}"$'\n'"${ACR_IMAGE}:${tag_name}"
            done <<< "$METADATA_TAGS"
          fi

          {
            echo "tags<<EOF"
            echo "$tags"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      # 健康端点身份块（standard 025）的构建期溯源值：version/sha/stage/buildTime。
      # 作为 build-args 注入镜像 ENV；health route 运行时读取。非 tag 构建诚实兜底 dev。
      - name: Resolve build provenance
        id: prov
        shell: bash
        run: |
          set -euo pipefail
          echo "git_sha=$(printf '%s' '${{ github.sha }}' | cut -c1-8)" >> "$GITHUB_OUTPUT"
          if [ "${{ github.ref_type }}" = "tag" ]; then
            echo "app_version=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "app_version=dev" >> "$GITHUB_OUTPUT"
          fi
          case "${{ github.ref_name }}" in
            v*)     stage=production ;;
            beta-*) stage=beta ;;
            dev-*)  stage=dev ;;
            *)      stage=dev ;;
          esac
          echo "deploy_stage=$stage" >> "$GITHUB_OUTPUT"
          echo "build_time=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      # B8: build+push 首发失败容错（GHCR/ACR/buildx 抖动），失败则重试一次。
      # 重试幂等：push 同 tag 覆盖；cache-to 同 scope 覆盖。重试步骤无 continue-on-error，
      # 二次仍失败即让该镜像 matrix 腿失败（fail-fast:false，不影响其它镜像）。
      - name: Build and push
        id: build
        continue-on-error: true
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          build-args: |
            ${{ matrix.build-args }}
            NEXT_PUBLIC_CF_TURNSTILE_TENANT_SITE_KEY=${{ vars.CF_TURNSTILE_TENANT_SITE_KEY }}
            NEXT_PUBLIC_CF_TURNSTILE_ADMIN_SITE_ID=${{ vars.CF_TURNSTILE_ADMIN_SITE_KEY }}
            NEXT_PUBLIC_CF_TURNSTILE_ADMIN_SITE_KEY=${{ vars.CF_TURNSTILE_ADMIN_SITE_KEY }}
            APP_VERSION=${{ steps.prov.outputs.app_version }}
            GIT_SHA=${{ steps.prov.outputs.git_sha }}
            BUILD_TIME=${{ steps.prov.outputs.build_time }}
            DEPLOY_STAGE=${{ steps.prov.outputs.deploy_stage }}
          platforms: linux/amd64
          push: true
          tags: ${{ steps.image-tags.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # 每个服务独立 scope，互不干扰
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,scope=${{ matrix.name }},mode=max

      - name: Build and push (retry)
        if: steps.build.outcome == 'failure'
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          build-args: |
            ${{ matrix.build-args }}
            NEXT_PUBLIC_CF_TURNSTILE_TENANT_SITE_KEY=${{ vars.CF_TURNSTILE_TENANT_SITE_KEY }}
            NEXT_PUBLIC_CF_TURNSTILE_ADMIN_SITE_ID=${{ vars.CF_TURNSTILE_ADMIN_SITE_KEY }}
            NEXT_PUBLIC_CF_TURNSTILE_ADMIN_SITE_KEY=${{ vars.CF_TURNSTILE_ADMIN_SITE_KEY }}
            APP_VERSION=${{ steps.prov.outputs.app_version }}
            GIT_SHA=${{ steps.prov.outputs.git_sha }}
            BUILD_TIME=${{ steps.prov.outputs.build_time }}
            DEPLOY_STAGE=${{ steps.prov.outputs.deploy_stage }}
          platforms: linux/amd64
          push: true
          tags: ${{ steps.image-tags.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,scope=${{ matrix.name }},mode=max
