name: deploy

# 主干 + tag 触发 CD。tag 前缀 → 环境；环境级密钥 + 生产审批门控由 `environment:` 承接。
# 前置：镜像已由 docker-build.yml 在同一 tag 上 build+push 到 ACR（tag = github.ref_name）。
#
# 这是 domestic profile（ACR 内网 + tailnet）：CI runner 入 tailnet → 走内网到 worker-01，
# worker-01 的 SSH 不对公网开放。host 用 DEPLOY_HOST_TAILNET（tailnet 地址）；
# DEPLOY_HOST_PUBIP 留作手工运维兜底，CI 不用。
# umbra 是 overseas 变体（README §5）：去掉 tailscale join、镜像换 GHCR、直连公网 SSH。
#
# 主机侧只同步部署包（compose/scripts/database…）到 /srv/vxture/deploy；实际 .env、
# secrets、证书保持在 worker-01 本机（人工维护）。常规升级链路（31）只拉镜像重建 +
# 健康校验，**不跑 migration/seed** —— seed reseed 是独立授权的人工 DB 操作。

on:
  push:
    tags:
      - "dev-*"
      - "beta-*"
      - "v*.*.*"
    # varda 已独立：varda-* 走 deploy-varda.yml（worker-02，独立审批门）。本 workflow 纯平台。

permissions:
  contents: read
  actions: read # gh run list：等待同 tag 的 docker-build 完成

concurrency:
  # 同一环境串行，不取消进行中的生产部署。
  group: deploy-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  resolve:
    name: Resolve environment
    runs-on: ubuntu-latest
    outputs:
      env: ${{ steps.map.outputs.env }}
    steps:
      - id: map
        run: |
          set -euo pipefail
          case "${GITHUB_REF_NAME}" in
            dev-*)   echo "env=develop"    >> "$GITHUB_OUTPUT" ;;
            beta-*)  echo "env=beta"       >> "$GITHUB_OUTPUT" ;;
            v*.*.*)  echo "env=production" >> "$GITHUB_OUTPUT" ;;
            *) echo "::error::unrecognized deploy tag ${GITHUB_REF_NAME}"; exit 1 ;;
          esac

  deploy:
    name: Deploy (${{ needs.resolve.outputs.env }})
    needs: resolve
    runs-on: ubuntu-latest
    # environment 承接两件事：① 注入该环境的 DEPLOY_* 密钥 / CF_TURNSTILE_* 变量；
    # ② production 触发必需审批人门控（tag 部署策略已限 v*.*.* 才能进 production）。
    environment: ${{ needs.resolve.outputs.env }}
    steps:
      - uses: actions/checkout@v5

      # deploy 与 docker-build 由同一 tag 并行触发、无先后依赖。过审批门后先确保本 tag
      # 的 docker-build 已成功（镜像已推 ACR），否则 host 拉取会 image not found
      # （2026-07-15 首发教训）。轮询等待（最多 ~20min）。
      - name: Wait for docker-build to publish images
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          for i in $(seq 1 80); do
            line="$(gh run list -R "$REPO" --workflow=docker-build.yml --event=push \
                      --json headBranch,status,conclusion \
                      -q "[.[] | select(.headBranch==\"$TAG\")][0] | (.status)+\"/\"+((.conclusion)//\"-\")" 2>/dev/null || echo "")"
            case "$line" in
              completed/success) echo "docker-build succeeded for $TAG"; exit 0 ;;
              completed/*) echo "::error::docker-build for $TAG did not succeed ($line)"; exit 1 ;;
              *) echo "waiting for docker-build ($TAG): ${line:-pending} [$i/80]"; sleep 15 ;;
            esac
          done
          echo "::error::timed out waiting for docker-build ($TAG)"; exit 1

      # registry 归一化在 runner 端完成（与 docker-build 复用同一脚本），拉取优先内网地址；
      # 归一化结果传入 SSH，host 上只做 docker login，不重复实现归一化逻辑。
      # 注意：namespace 是 org **variable**（非 secret），从 vars.* 取。
      - name: Resolve image registry (ACR)
        id: registry
        shell: bash
        env:
          # registry / internal-host 是 org **variables**（2026-07-15 ACR 迁 cn-beijing
          # 后由 secret 改为 variable）；username/password 仍是 secrets。
          ALIYUN_ACR_REGISTRY: ${{ vars.ALIYUN_ACR_REGISTRY }}
          ALIYUN_ACR_INTERNAL_HOST: ${{ vars.ALIYUN_ACR_INTERNAL_HOST }}
          ALIYUN_ACR_NAMESPACE: ${{ vars.ALIYUN_ACR_NAMESPACE }}
          ALIYUN_ACR_USERNAME: ${{ secrets.ALIYUN_ACR_USERNAME }}
          ALIYUN_ACR_PASSWORD: ${{ secrets.ALIYUN_ACR_PASSWORD }}
        run: bash scripts/workflows/resolve-acr-registry.sh

      - name: Join tailnet
        uses: tailscale/github-action@v3
        with:
          oauth-client-id: ${{ secrets.TAILSCALE_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TAILSCALE_OAUTH_CLIENT_SECRET }}
          tags: ${{ vars.TAILSCALE_OAUTH_CLIENT_TAG }}

      # 只同步部署包；实际 .env / secrets / 证书保持在 worker-01 本机。
      - name: Upload deploy files to worker-01
        uses: appleboy/scp-action@v1.0.0
        with:
          host: ${{ secrets.DEPLOY_HOST_TAILNET }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          passphrase: ${{ secrets.DEPLOY_SSH_PASSPHRASE }}
          source: "deploy/compose.platform.yml,deploy/compose.nginx.yml,deploy/.env.example,deploy/.env.*.example,deploy/secrets/*.example,deploy/scripts,deploy/maintenance,deploy/nginx,deploy/guardrails,deploy/database"
          target: "/tmp/vxture-deploy"
          rm: true
          timeout: 120s
          command_timeout: 10m

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.5
        env:
          VX_IMAGE_TAG: ${{ github.ref_name }}
          VX_ACR_ENABLED: ${{ steps.registry.outputs.acr_enabled }}
          # 内网优先(快/省流)、公网兜底(worker-01 内网 ACR 端点不可达时)。
          VX_IMAGE_REGISTRY_INTERNAL: ${{ steps.registry.outputs.acr_registry_internal }}
          VX_IMAGE_REGISTRY_PUBLIC: ${{ steps.registry.outputs.acr_registry_public }}
          VX_IMAGE_NAMESPACE: ${{ steps.registry.outputs.acr_namespace }}
          ALIYUN_ACR_USERNAME: ${{ secrets.ALIYUN_ACR_USERNAME }}
          ALIYUN_ACR_PASSWORD: ${{ secrets.ALIYUN_ACR_PASSWORD }}
        with:
          host: ${{ secrets.DEPLOY_HOST_TAILNET }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          passphrase: ${{ secrets.DEPLOY_SSH_PASSPHRASE }}
          command_timeout: 60m
          envs: VX_IMAGE_TAG,VX_ACR_ENABLED,VX_IMAGE_REGISTRY_INTERNAL,VX_IMAGE_REGISTRY_PUBLIC,VX_IMAGE_NAMESPACE,ALIYUN_ACR_USERNAME,ALIYUN_ACR_PASSWORD
          script: |
            set -e

            # 服务端只同步部署包，实际 .env、secrets、证书保持在 worker-01 本机。
            DEPLOY_DIR=/srv/vxture/deploy
            mkdir -p "$DEPLOY_DIR"
            cp -f /tmp/vxture-deploy/deploy/compose.platform.yml "$DEPLOY_DIR/compose.platform.yml"
            cp -f /tmp/vxture-deploy/deploy/compose.nginx.yml "$DEPLOY_DIR/compose.nginx.yml"
            cp -f /tmp/vxture-deploy/deploy/.env.example "$DEPLOY_DIR/.env.example"
            cp -f /tmp/vxture-deploy/deploy/.env.*.example "$DEPLOY_DIR/"
            mkdir -p "$DEPLOY_DIR/secrets"
            cp -f /tmp/vxture-deploy/deploy/secrets/*.example "$DEPLOY_DIR/secrets/"
            rm -rf "$DEPLOY_DIR/scripts"
            cp -R /tmp/vxture-deploy/deploy/scripts "$DEPLOY_DIR/scripts"
            rm -rf "$DEPLOY_DIR/maintenance"
            cp -R /tmp/vxture-deploy/deploy/maintenance "$DEPLOY_DIR/maintenance"
            rm -rf "$DEPLOY_DIR/nginx"
            cp -R /tmp/vxture-deploy/deploy/nginx "$DEPLOY_DIR/nginx"
            rm -rf "$DEPLOY_DIR/guardrails"
            cp -R /tmp/vxture-deploy/deploy/guardrails "$DEPLOY_DIR/guardrails"
            rm -rf "$DEPLOY_DIR/database"
            cp -R /tmp/vxture-deploy/deploy/database "$DEPLOY_DIR/database"

            IMAGE_NAMESPACE="${VX_IMAGE_NAMESPACE:-vxture}"
            IMAGE_TAG="${VX_IMAGE_TAG:-latest}"
            IMAGE_REGISTRY="${VX_IMAGE_REGISTRY_PUBLIC:-ghcr.io}"

            # registry 归一化已在 runner 端完成；host 上只做 login。ACR 内网端点(快/省流)
            # 优先，但 worker-01 若不在同 VPC/区域会连不通(context deadline exceeded)——
            # 那就回退公网 ACR 端点(docker-build 已把镜像推到公网路径，同一仓库)。
            if [ "${VX_ACR_ENABLED:-false}" = "true" ]; then
              LOGGED_IN=""
              for CAND in "$VX_IMAGE_REGISTRY_INTERNAL" "$VX_IMAGE_REGISTRY_PUBLIC"; do
                [ -n "$CAND" ] || continue
                if echo "$ALIYUN_ACR_PASSWORD" | docker login "$CAND" -u "$ALIYUN_ACR_USERNAME" --password-stdin; then
                  IMAGE_REGISTRY="$CAND"; LOGGED_IN=1
                  echo "Using Aliyun ACR images: $IMAGE_REGISTRY/$IMAGE_NAMESPACE:$IMAGE_TAG"
                  break
                fi
                echo "  ACR login failed/unreachable: $CAND — trying next endpoint"
              done
              [ -n "$LOGGED_IN" ] || { echo "ERROR: could not log into ACR (internal + public both failed)"; exit 1; }
            else
              echo "ACR not enabled — falling back to compose default registry ($IMAGE_REGISTRY)."
            fi

            # ── container-name migration (product_320: vx-* → vx-platform-*) ──
            # The stack's container_names were prefixed vx-platform-* (ACR
            # namespace hygiene). worker-01's hand-maintained runtime .env still
            # points inter-service URLs at the OLD names (e.g.
            # AUTH_BFF_URL=http://vx-auth-bff:3090), so migrate them in place
            # BEFORE the recreate or cross-service calls break. Idempotent
            # (results carry no old substring) + longest-first (so vx-admin
            # never mangles vx-admin-bff). Shipped nginx confs already carry the
            # new names; this only fixes host-side runtime env.
            RT=/srv/vxture/runtime
            for envf in "$RT"/.env.*; do
              [ -f "$envf" ] || continue
              sed -i \
                -e 's/vx-website-bff/vx-platform-website-bff/g' \
                -e 's/vx-console-bff/vx-platform-console-bff/g' \
                -e 's/vx-admin-bff/vx-platform-admin-bff/g' \
                -e 's/vx-auth-bff/vx-platform-auth-bff/g' \
                -e 's/vx-gateway-bff/vx-platform-gateway-bff/g' \
                -e 's/vx-model-platform/vx-platform-model-platform/g' \
                -e 's/vx-accounts/vx-platform-accounts/g' \
                -e 's/vx-website/vx-platform-website/g' \
                -e 's/vx-console/vx-platform-console/g' \
                -e 's/vx-admin/vx-platform-admin/g' \
                "$envf"
            done
            echo "  [ok] runtime .env inter-service names migrated to vx-platform-*"

            # 拉取新镜像并执行常规升级发布链路；migration/seed 只允许首次部署或人工脚本执行。
            cd "$DEPLOY_DIR"
            VX_IMAGE_REGISTRY="$IMAGE_REGISTRY" VX_IMAGE_NAMESPACE="$IMAGE_NAMESPACE" VX_IMAGE_TAG="$IMAGE_TAG" COMPOSE_PARALLEL_LIMIT=1 \
              bash scripts/31-regular-upgrade-platform.sh
