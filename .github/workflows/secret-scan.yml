name: secret-scan

# 敏感信息 CI 门禁（三层机制之一：本地 pre-commit 钩子 → 本 CI 门禁 → GitHub 原生
# push protection）。gitleaks 全量扫描；命中即 fail，阻断合并/推送。
# 直接下载 pinned gitleaks 二进制运行 —— 官方 gitleaks-action 对 org 仓库要求 license，
# 二进制方式不需要。规则见仓库根 .gitleaks.toml。

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: secret-scan-${{ github.event_name == 'pull_request' && format('pr-{0}', github.event.pull_request.number) || github.ref }}
  cancel-in-progress: true

env:
  # 升级时改这一处（对照 https://github.com/gitleaks/gitleaks/releases）。
  GITLEAKS_VERSION: "8.21.2"

jobs:
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v5
        with:
          # detect 需完整历史；PR 场景 gitleaks 自动只扫增量提交范围。
          fetch-depth: 0

      - name: Install gitleaks
        run: |
          set -euo pipefail
          curl -sSfL \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar -xz gitleaks
          sudo install -m 0755 gitleaks /usr/local/bin/gitleaks
          gitleaks version

      - name: Scan
        run: |
          set -euo pipefail
          gitleaks detect \
            --source . \
            --config .gitleaks.toml \
            --redact \
            --exit-code 1 \
            --report-format sarif \
            --report-path gitleaks.sarif \
            --verbose

      - name: Upload findings (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-sarif
          path: gitleaks.sarif
          if-no-files-found: ignore
