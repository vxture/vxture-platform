name: ci

on:
  # 主干模型：main 的 PR 与 push 跑 CI（quality-gate/build/test-coverage/audit）。
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.event_name == 'pull_request' && format('pr-{0}', github.event.pull_request.number) || format('push-{0}', github.ref_name) }}
  cancel-in-progress: true

jobs:
  # ── 1. Format ──────────────────────────────────────────────────────────────
  format:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-node-pnpm

      - name: Check formatting
        run: pnpm format:check

  # ── 2. Audit ───────────────────────────────────────────────────────────────
  audit:
    name: audit
    runs-on: ubuntu-latest
    env:
      # 升级时改这一处（对照 https://github.com/google/osv-scanner/releases）。
      OSV_SCANNER_VERSION: "1.9.2"
    steps:
      - uses: actions/checkout@v6

      # 真 SCA：osv-scanner 扫 pnpm-lock 全依赖树 vs OSV 漏洞库，取代已被 npm 下线的
      # pnpm quick-audit 端点（HTTP 410）。照 secret-scan 的 gitleaks 模式下 pinned
      # 二进制，不用第三方 action（无 license/供应链顾虑）。install 阻断（URL/版本错会响）。
      - name: Install osv-scanner
        run: |
          set -euo pipefail
          curl -sSfL \
            "https://github.com/google/osv-scanner/releases/download/v${OSV_SCANNER_VERSION}/osv-scanner_linux_amd64" \
            -o osv-scanner
          sudo install -m 0755 osv-scanner /usr/local/bin/osv-scanner
          osv-scanner --version

      # 暂非阻断：triage 完成（PR-A/B 已修全部可修项），仅余 .osv-scanner.toml 里记名接受的
      # dev-only 传递残留。--config 显式指定（扫 --lockfile 时 osv-scanner 不自动发现根 config）。
      # 下一步去掉 continue-on-error 收紧为真阻断门（PR-C）。取代原先空跑的假绿。
      - name: OSV dependency scan
        continue-on-error: true
        run: osv-scanner --config=.osv-scanner.toml --lockfile=pnpm-lock.yaml

  # ── 3. Check (type · lint · guardrail · boundaries) ───────────────────────
  check:
    # 该名称是稳定契约：被 main-ruleset.json 的 required status checks 按名引用。
    # 内部步骤可演进，但 job 名（quality-gate / build / test-coverage）改动须同步 ruleset。
    name: quality-gate
    runs-on: ubuntu-latest
    outputs:
      docs_only: ${{ steps.changes.outputs.docs_only }}
      # 本次变更影响的镜像集（= 构建目标）；build/test 据此只处理受影响组件。
      affected_images: ${{ steps.changes.outputs.affected_images }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Classify changed paths
        id: changes
        env:
          BASE_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}
          HEAD_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
        run: node scripts/workflows/classify-changes.mjs --base "$BASE_SHA" --head "$HEAD_SHA"

      # 始终运行（含 docs-only）：守住分类器 allow-list「默认 SKIP」安全性，
      # 防止规则/逻辑改动悄悄退化为误构建/误部署。无依赖、秒级。
      - name: Classifier allow-list regression test
        run: node --test scripts/workflows/classify-changes.test.mjs

      - name: Docs-only quality gate
        if: steps.changes.outputs.docs_only == 'true'
        run: echo "::notice::Docs-only change; heavy quality gate steps skipped while keeping the required check stable."

      - uses: ./.github/actions/setup-node-pnpm
        if: steps.changes.outputs.docs_only != 'true'

      - name: Build shared & core packages
        if: steps.changes.outputs.docs_only != 'true'
        run: pnpm build:backend-deps

      - name: Generate Prisma clients
        if: steps.changes.outputs.docs_only != 'true'
        run: |
          pnpm --filter @vxture/service-model-platform db:generate
          pnpm --filter @vxture/agent-server-varda prisma:generate

      # 把已构建的后端依赖 dist 与 Prisma client 作为产物上传，供 build / test job 复用，
      # 避免在并行 job 中重复执行 build:backend-deps 与 prisma generate。
      - name: Upload backend build (deps dist + prisma clients)
        if: steps.changes.outputs.docs_only != 'true'
        uses: actions/upload-artifact@v7
        with:
          name: backend-build
          path: |
            packages/shared/shared/dist
            packages/core/*/dist
            services/model/platform/src/generated/prisma
            agent-server/varda/src/generated/prisma
          retention-days: 1
          include-hidden-files: true

      - name: Type check
        if: steps.changes.outputs.docs_only != 'true'
        run: pnpm type-check:all

      - name: Lint
        if: steps.changes.outputs.docs_only != 'true'
        run: pnpm --recursive --if-present lint

      - name: Design system guardrail
        if: steps.changes.outputs.docs_only != 'true'
        run: pnpm lint:design

      - name: Env audit (deploy bundle + runtime template contract)
        if: steps.changes.outputs.docs_only != 'true'
        run: |
          VX_WORKER_DIR="deploy" \
          VX_ENV_AUDIT_FAIL_WARNINGS=1 \
          node scripts/guardrails/audit-env.mjs

      - name: Package boundary check
        if: steps.changes.outputs.docs_only != 'true'
        run: pnpm lint:boundaries

      # SQL-DDL 单一权威门控（data_platform_320）：铁律设计检查 + 退役 schema/搬迁表残留检查。
      # 残留检查含路径② Prisma @@schema/@@map（防 model-platform 类漏网：裸串扫描无感的库映射残留）。
      - name: Data architecture guardrail (SQL-DDL single authority)
        if: steps.changes.outputs.docs_only != 'true'
        run: |
          pnpm lint:data-design
          pnpm lint:schema-residue
          pnpm lint:seed
          pnpm lint:catalog-domains

  # ── 4. Build ───────────────────────────────────────────────────────────────
  build:
    name: build
    runs-on: ubuntu-latest
    needs: [check]
    # TD-024: auth-bff's RedisService.onModuleInit() awaits a real connection and
    # fails closed by design (it is the central session store) — its boot-smoke
    # needs an actual reachable Redis, unlike the other BFFs' lazy clients.
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
    steps:
      - name: Docs-only build gate
        if: needs.check.outputs.docs_only == 'true'
        run: echo "::notice::Docs-only change; build check satisfied without artifact build."

      - uses: actions/checkout@v6
        if: needs.check.outputs.docs_only != 'true'

      - uses: ./.github/actions/setup-node-pnpm
        if: needs.check.outputs.docs_only != 'true'

      - name: Restore backend build (deps dist + prisma clients)
        if: needs.check.outputs.docs_only != 'true'
        uses: actions/download-artifact@v8
        with:
          name: backend-build

      # 变更门控：只建/smoke 受影响的组件（quality-gate 的 affected_images，走 docker-build
      # 同款传递依赖规则）。改一个官网页只建 website-bff；varda 没动就不建 varda_*
      # （varda 独立部署 worker-02，见 repo-governance-standard）。改共享包则正确牵连全部。
      # TD-024 boot-smoke：建 esbuild bundle 并用假 env 启全 DI 图——唯一验 bundle 运行态
      # 形态的门（隐式构造注入陷阱在此暴露，tsc/单测看不到）。auth-bff/varda-bff 的 boot-smoke
      # 需真 Redis（RedisService.onModuleInit fail-closed）；REDIS_URL 全局设，其余 smoke 忽略。
      - name: Build & boot-smoke affected bundles
        if: needs.check.outputs.docs_only != 'true'
        env:
          AFFECTED: ${{ needs.check.outputs.affected_images }}
          REDIS_URL: redis://localhost:6379
        run: |
          set -euo pipefail
          has() { printf '%s' "$AFFECTED" | grep -q "\"$1\""; }
          smoke() { pnpm --filter "$1" build:bundle && pnpm --filter "$1" boot-smoke; }
          if has platform_service-model-platform; then pnpm --filter @vxture/service-model-platform build; fi
          if has varda_agent;                     then pnpm --filter @vxture/agent-server-varda build; fi
          if has platform_bff-admin;              then smoke @vxture/bff-admin; fi
          if has platform_bff-auth;               then smoke @vxture/bff-auth; fi
          if has platform_bff-console;            then smoke @vxture/bff-console; fi
          if has platform_bff-website;            then smoke @vxture/bff-website; fi
          if has platform_bff-platform-api;       then smoke @vxture/bff-platform-api; fi
          if has varda_bff;                       then smoke @vxture/bff-varda; fi
          echo "built affected bundles: ${AFFECTED:-[]}"

  # ── 5. Test Coverage ───────────────────────────────────────────────────────
  test:
    name: test-coverage
    runs-on: ubuntu-latest
    needs: [check]
    steps:
      - name: Docs-only test gate
        if: needs.check.outputs.docs_only == 'true'
        run: echo "::notice::Docs-only change; test-coverage check satisfied without coverage artifact."

      - uses: actions/checkout@v6
        if: needs.check.outputs.docs_only != 'true'
        with:
          fetch-depth: 0 # pnpm 变更过滤需要 git 历史

      - uses: ./.github/actions/setup-node-pnpm
        if: needs.check.outputs.docs_only != 'true'

      - name: Restore backend build (deps dist + prisma clients)
        if: needs.check.outputs.docs_only != 'true'
        uses: actions/download-artifact@v8
        with:
          name: backend-build

      # 只测变更包 + 依赖者（pnpm 原生 `...[<since>]`：<since> 起变更的包 ∪ 其依赖者）。
      # base 不可用（首推/force-push，SHA 为空或全零）时回退全量测试。
      - name: Run tests (changed packages + dependents)
        if: needs.check.outputs.docs_only != 'true'
        env:
          BASE_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}
        run: |
          set -euo pipefail
          if [ -n "$BASE_SHA" ] && git cat-file -e "${BASE_SHA}^{commit}" 2>/dev/null; then
            echo "testing packages changed since $BASE_SHA + dependents"
            pnpm --filter "...[${BASE_SHA}]" --if-present test
          else
            echo "base '$BASE_SHA' unavailable — running all tests"
            pnpm --recursive --if-present test
          fi

      - name: Generate coverage report
        if: needs.check.outputs.docs_only != 'true'
        run: pnpm --filter @vxture/service-model-platform test:coverage

      - name: Upload coverage report
        if: needs.check.outputs.docs_only != 'true'
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: services/model/platform/coverage/lcov.info
          retention-days: 1

  # ── 6. SonarQube ───────────────────────────────────────────────────────────
  sonar:
    name: SonarQube
    runs-on: ubuntu-latest
    needs: [check, test]
    if: >
      needs.check.outputs.docs_only != 'true' &&
      (
        github.event_name == 'pull_request' ||
        github.ref == 'refs/heads/main' ||
        github.ref == 'refs/heads/beta' ||
        github.ref == 'refs/heads/develop'
      )
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download coverage report
        uses: actions/download-artifact@v8
        with:
          name: coverage-report
          path: services/model/platform/coverage/

      - name: SonarQube Scan
        # 暂非阻塞：新仓库 vxture-platform 尚未在 SonarCloud 侧绑定项目（scan 返回 403）。
        # 在 SonarCloud 导入本仓库建项目 + 更新 sonar-project.properties 后，移除本行恢复硬门禁。
        continue-on-error: true
        uses: SonarSource/sonarqube-scan-action@v7
        with:
          skipSignatureVerification: false
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
